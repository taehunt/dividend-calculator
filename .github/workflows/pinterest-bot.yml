name: Pinterest Auto Posting Bot

on:
  schedule:
    # 매일 UTC 14:00 = 한국시간 23:00
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  pin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow requests

      - name: Run Pinterest Bot
        env:
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
        run: python bots/pinterest/pin.py
