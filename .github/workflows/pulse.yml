name: Income Pulse Daily Update

on:
  schedule:
    # 매일 UTC 21:00 = 한국시간 06:00
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-pulse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: python -m pip install --upgrade pip

      - name: Fetch Income Pulse data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python bots/pulse/fetch_pulse.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/income-pulse.json
          if git diff --staged --quiet; then
            echo "No pulse data changes"
            exit 0
          fi
          git commit -m "Update Income Pulse data"
          git push
